<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
</head>
<body>
    <center>
        <h1>Employment Application form</h1>
    </center>
    <br>
    <div>
        <form action="zerodha."  method="post">

            <label for="fname">First name *</label>
            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
            <label for="lname">Last name *</label>
            <br>
            <input type="text" name="fname" id="fname" value="john" placeholder="write your first name">
            <input type="text" name="lname" id="lname" value="doe" placeholder="write your last name">
            <br><br>
            <label for="">Email *</label>
            <br>
            <input type="email" size="46" placeholder="write your email">
            <br><br>
            <label for="">Portfolio website</label>
            <br>
            <input type="text" value="http://">
            <br><br>
            <label for="">Position you are applying for *</label>
            <br>
            <select name="" id="">
                <option value="">Software devloper</option>
                <option value="">Frontend devloper</option>
                <option value="">Backend devloper</option>
                <option value="">Fullstack devloper</option>
                <option value="">Ai Engineer</option>
            </select>
            <br><br>
            <label for="">Salary requirments</label>
            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
            <label for="">When can you start?</label>
            <br>
            <input type="text" placeholder="enter salary you want">
            <input type="date">
            <br><br>
            <label for="">Phone *</label>
            <br>
            <input type="tel" placeholder="10 digit mobile no.">
            <br><br>
            <label >Are you willing to relocate?</label>
            <br>
            <input type="radio" name="relocate" id="Yes">
            <label for="Yes">Yes</label>
            <input type="radio" name="relocate" id="No">
            <label for="No">No</label>
            <input type="radio" name="relocate" id="Not sure">
            <label for="Not sure">Not sure</label>
            <br><br>
            <label for="">Last company you worked (optinal)</label>
            <br>
            <input type="text">
            <br><br>
            <label for="">Refrence / Comments / Question</label>
            <br>
            <textarea cols="50" rows="8"></textarea>
            <br><br>
            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
            &nbsp;&nbsp;&nbsp;
            <button>Send Application</button>
       
        </form>
    </div>
</body>
</html>
